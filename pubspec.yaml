name: geo_social_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Maps - OpenStreetMap (free, no billing required)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  cloud_firestore: ^4.17.5
  firebase_core: ^2.32.0
  geoflutterfire2: ^2.3.6
  custom_info_window: ^1.0.1
  provider: ^6.1.1 # Adding provider for state management if needed, good practice
  shared_preferences: ^2.2.2
  uuid: ^4.0.0
  firebase_analytics: ^10.0.0
  # google_mobile_ads: ^5.0.0  # Temporarily disabled for build

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#5B9FFF"
  adaptive_icon_foreground: "assets/icon.png"
